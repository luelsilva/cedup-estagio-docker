version: '3.8'

services:
  api:
    build:
      context: ./urso-estagio
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./urso-estagio/.env
    restart: always

  frontend:
    build:
      context: ./cedup-estagio
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - PORT=5173
      - ORIGIN=http://localhost:5173
    depends_on:
      - api
    restart: always
