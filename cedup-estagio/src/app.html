<!doctype html>
<html lang="pt-br">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	%sveltekit.head%
	<link rel="icon" type="image/png" href="/favicon.png" />
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">
		%sveltekit.body%
		<!-- Simple loading spinner that disappears once Svelte hydrates -->
		<div id="initial-loader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f9fafb; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.3s ease-out;">
			<div style="display: flex; flex-direction: column; align-items: center; gap: 1rem;">
				<div style="width: 40px; height: 40px; border: 4px solid #e5e7eb; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;"></div>
				<p style="color: #6b7280; font-family: sans-serif; font-size: 14px; font-weight: 500;">Carregando sistema...</p>
			</div>
		</div>
		<style>
			@keyframes spin { to { transform: rotate(360deg); } }
			.loaded #initial-loader { opacity: 0; pointer-events: none; }
		</style>
		<script>
			// Detect when Svelte is ready (basic heuristic)
			window.addEventListener('load', () => {
				setTimeout(() => {
					const loader = document.getElementById('initial-loader');
					if (loader) {
						loader.style.opacity = '0';
						setTimeout(() => loader.remove(), 300);
					}
				}, 500);
			});
		</script>
	</div>
</body>

</html>
